<details>
<summary>Table of Contents</summary>
<ol>
{% for entry in site.data.guide-toc %}
{% assign entry_num = forloop.index %}
{% if page.path == entry.file %}
  <li><strong>{{ entry.title }}</strong> &larr; you are here</li>
{% else %}
  <li><a href="{{ entry.file | split: "/" | last }}">{{ entry.title }}</a></li>
{% endif %}
{% endfor %}
</ol>
</details>
